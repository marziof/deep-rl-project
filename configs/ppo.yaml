# PPO configuration
env: CartPole-v1

# Training
total_timesteps: 500000
n_steps: 2048
n_epochs: 10
batch_size: 64

# Algorithm
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
vf_coef: 0.5
ent_coef: 0.01
max_grad_norm: 0.5
learning_rate: 0.0003

# Network
hidden_sizes: [64, 64]

# Logging
log_interval: 1
eval_interval: 10000
n_eval_episodes: 10

# Reproducibility
seed: 42
