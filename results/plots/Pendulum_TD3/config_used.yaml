# General settings of the simulation
experiment:
  env_name: "Pendulum-v1" #Cartpole Choose from [CartPole-v1, Pendulum-v1]
  algo: "td3" # Choose from [dqn, ppo, sac, td3]
  n_episodes: 300
  eval_interval: 10
  seeds: [0,1,2]
  exp_name: "Pendulum_TD3"

# Algorithm-specific hyperparameters 
algos:  
  sac:
    lr: 0.0003
    tau: 0.005
    alpha: 0.2
    batch_size: 64
    buffer_capacity: 20000
    gamma: 0.99
    gradient_steps: 1
    target_update_freq: 500

  td3: 
    gamma: 0.99
    batch_size: 64
    lr: 0.0003
    sigma: 0.1
    sigma_tilde: 0.2
    c: 0.5
    tau: 0.005
    policy_delay: 2
    buffer_capacity: 20000

  dqn: 
    gamma: 0.99
    lr: 0.001
    buffer_capacity: 20000
    eps: 1.0
    eps_min: 0.05
    eps_decay: 0.999
    target_update_freq: 500
    batch_size: 64

  
  ppo: 
    lr: 0.0003
    n_steps: 2048
    clip_range: 0.2
  

